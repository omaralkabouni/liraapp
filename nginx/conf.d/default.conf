# =============================================================
# Nginx Virtual Host Configuration
# HTTP (port 80) - redirects to HTTPS in production
# HTTPS (port 443) - main entry point
# =============================================================

# ---- Upstream Servers ----
upstream backend_api {
    server backend:3001;
    keepalive 32;
}

upstream admin_panel {
    server admin-panel:80;
    keepalive 8;
}

# ---- HTTP → HTTPS Redirect ----
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Main HTTPS Server ----
server {
    listen 443 ssl http2;
    server_name liranow.sy www.liranow.sy;

    ssl_certificate /etc/letsencrypt/live/liranow.sy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liranow.sy/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size
    client_max_body_size 10M;

    # ---- Public API (for web & mobile) ----
    location /api/v1/ {
        limit_req zone=api burst=60 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        
        # CORS for mobile app
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ---- Admin API (protected) ----
    location /api/admin/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Login rate limiting ----
    location /api/admin/auth/login {
        limit_req zone=login burst=5 nodelay;
        
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Health Check ----
    location /health {
        proxy_pass http://backend_api;
        access_log off;
    }

    # ---- Admin Panel ----
    location /admin/ {
        proxy_pass http://admin_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Default: serve static (Next.js will be configured here later) ----
    location / {
        return 301 /admin/;
    }
}

