# =============================================================
# 🪙 الليرة الآن — Portainer Stack
# يعمل مع: Portainer → Stacks → Add Stack → Repository
# Repository URL: https://github.com/omaralkabouni/liraapp
# Compose path: docker-compose.portainer.yml
# =============================================================

version: '3.9'

services:

  # =============================================
  # 🗄️ PostgreSQL (مع SQL scripts مدمجة)
  # =============================================
  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: liranow_postgres_custom
    container_name: liranow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liranow_db}
      POSTGRES_USER: ${POSTGRES_USER:-liranow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePass2026!}
      TZ: Asia/Damascus
    volumes:
      - liranow_postgres_data:/var/lib/postgresql/data
    networks:
      - liranow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liranow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # ⚡ Redis Cache
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: liranow_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisPass2026!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - liranow_redis_data:/data
    networks:
      - liranow_net
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-RedisPass2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # 🚀 Backend API (Node.js)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: liranow_backend
    container_name: liranow_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-liranow_user}:${POSTGRES_PASSWORD:-SecurePass2026!}@postgres:5432/${POSTGRES_DB:-liranow_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-RedisPass2026!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET}
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@liranow.sy}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2026}
      ADMIN_NAME: ${ADMIN_NAME:-مدير النظام}
      PRICE_FETCH_INTERVAL_MINUTES: ${PRICE_FETCH_INTERVAL_MINUTES:-5}
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY:-}
      GOLD_API_KEY: ${GOLD_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: Asia/Damascus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liranow_net
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # =============================================
  # 🎛️ Admin Panel
  # =============================================
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    image: liranow_admin
    container_name: liranow_admin
    restart: unless-stopped
    networks:
      - liranow_net
    expose:
      - "80"

  # =============================================
  # 🌐 Nginx Reverse Proxy
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: liranow_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:80"   # غيّر 8088 إلى أي بورت متاح لديك
    networks:
      - liranow_net
    depends_on:
      - backend
      - admin-panel
    command: >
      /bin/sh -c "
      cat > /etc/nginx/conf.d/default.conf << 'EOF'
      upstream backend_api {
        server backend:3001;
        keepalive 16;
      }
      upstream admin_ui {
        server admin-panel:80;
      }
      server {
        listen 80;
        client_max_body_size 10M;
        gzip on;
        gzip_types application/json text/css application/javascript text/plain;

        location /api/ {
          proxy_pass http://backend_api;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          add_header Access-Control-Allow-Origin *;
          add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
          add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
          if ($$request_method = OPTIONS) { return 204; }
        }

        location /admin/ {
          proxy_pass http://admin_ui/;
          proxy_set_header Host $$host;
        }

        location /health {
          proxy_pass http://backend_api;
          access_log off;
        }

        location / {
          return 301 /admin/;
        }
      }
      EOF
      nginx -g 'daemon off;'"

# =============================================
# 🗂️ Volumes
# =============================================
volumes:
  liranow_postgres_data:
    name: liranow_postgres_data
  liranow_redis_data:
    name: liranow_redis_data

# =============================================
# 🌐 Networks
# =============================================
networks:
  liranow_net:
    driver: bridge
    name: liranow_net
